paths:
  data_incoming: "data/incoming"
  data_parsed: "data/parsed"
  data_output: "data/output"
  db_path: "data/parsed/app.db"

model:
  runtime: "lmstudio"
  name: "qwen3.6-35b-a3b"   # auto-picked from server if unset via OLLAMA_MODEL
  temperature: 0.0

llm:
  backend: "lmstudio"        # lmstudio | ollama
  host: "http://10.5.65.131:1234"
  timeout: 120               # seconds per call (large models need more time)
  cache: true          # cache identical (model, prompt) pairs in-process
  cache_max: 2000      # max cached entries before LRU eviction
  num_ctx: 2048        # context window — keep small for speed on 1.5B
  num_predict: 200     # max tokens to generate per call

ocr:
  enabled: true
  tesseract_cmd: ""

security:
  air_gapped: true
  outbound_block_required: true
